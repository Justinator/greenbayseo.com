# Metadata about this component, to be used in the CMS
spec:
  structures:
    - content_blocks
  label: "Floor Plan Feed"
  description: Displays a filterable grid of floor plan cards
  icon: home
  tags: ["Page Components"]

# Defines the structure of this component, as well as the default values
blueprint:
  show_style_filter: true
  filter_by_style: ''
  filter_by_series: ''

# Overrides any fields in the blueprint when viewing this component in the component browser
preview:

# Any extra CloudCannon inputs configuration to apply to the blueprint
_inputs:
  show_style_filter:
    type: switch
    comment: Show the Home Style filter group in the sidebar
  filter_by_style:
    type: select
    options:
      allow_empty: true
      values:
        - Cape Cod
        - Chalet
        - Colonial
        - Cottage
        - Duplex
        - Ranch
    comment: Only show plans of this style (leave empty for all)
  filter_by_series:
    type: select
    options:
      allow_empty: true
      values:
        - Starter Series
        - Single Section
    comment: Only show plans in this series (leave empty for all)
