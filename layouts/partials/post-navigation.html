{{ if or .PrevInSection .NextInSection }}
    <div class="post-navigation | content-full flex flex-justify-center">
        {{ with .PrevInSection }}
            <a href="{{ .Permalink }}" class="post-navigation__prev post-navigation__link | flex flex-align-center"><div class="icon-lg icon-fill-primary">{{ partialCached "svg-icons/chevron-left.svg" . }}</div>Previous Plan</a>
        {{ end }}
        {{ with .NextInSection }}
            <a href="{{ .Permalink }}" class="post-navigation__next post-navigation__link | flex flex-align-center">Next Plan<div class="icon-lg icon-fill-primary">{{ partialCached "svg-icons/chevron-right.svg" . }}</div></a>
        {{ end }}
    </div>
{{ end }}
